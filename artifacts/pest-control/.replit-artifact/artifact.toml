kind = "web"
previewPath = "/"
title = "Utkal Pest Control"
version = "1.0.0"
id = "artifacts/pest-control"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19006

[services.development]
run = "pnpm --filter @workspace/pest-control run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pest-control", "run", "build" ]
serve = "static"
publicDir = "artifacts/pest-control/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19006"
BASE_PATH = "/"
