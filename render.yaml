# Render blueprint — deploys the api-server as a web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: pest-control-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile=false && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8001
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_URI
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_NOTIFICATION_EMAIL
        sync: false
      - key: CORS_ORIGINS
        sync: false
